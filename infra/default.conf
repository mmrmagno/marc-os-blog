server {
    listen      8080 default_server;
    listen      [::]:8080 default_server;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri.html $uri/index.html =404;
    }

    location ~ ^/(_assets|_pagefind)/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location /fonts/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location ~* \.(xml|txt)$ {
        add_header Cache-Control "public, max-age=3600" always;
        try_files $uri =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }
}
