server {
    listen      8080 default_server;
    listen      [::]:8080 default_server;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Astro emits clean URLs (trailingSlash: 'never') — try the exact path,
    # then `.html`, then directory index, then 404.
    location / {
        try_files $uri $uri.html $uri/index.html =404;
    }

    # Long-cache hashed asset bundles + Pagefind shards.
    location ~ ^/(_assets|_pagefind)/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # Fonts: long cache.
    location /fonts/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # RSS + sitemap: shorter cache.
    location ~* \.(xml|txt)$ {
        add_header Cache-Control "public, max-age=3600" always;
        try_files $uri =404;
    }

    # Custom 404 page from Astro.
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Don't serve hidden files (other than .well-known).
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Tiny health endpoint for Docker / NPM upstream checks.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }
}
