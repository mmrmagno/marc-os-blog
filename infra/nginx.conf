user nginx;
worker_processes auto;
worker_rlimit_nofile 8192;

error_log /dev/stderr warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging to stdout, structured-ish.
    log_format main '$remote_addr - $remote_user [$time_iso8601] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /dev/stdout main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  30s;
    types_hash_max_size 2048;
    server_tokens off;          # don't leak version

    # Compression — the edge proxy (NPM) already does this for clients,
    # but having it on the inner nginx is harmless and helps if you ever
    # point browsers straight at it (homelab/dev).
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml+rss application/atom+xml image/svg+xml application/wasm;

    # Buffer hardening
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    client_max_body_size 1m;
    large_client_header_buffers 4 8k;
    client_body_timeout 12s;
    client_header_timeout 12s;
    send_timeout 10s;

    # Hide upstream identifying headers
    proxy_hide_header X-Powered-By;

    include /etc/nginx/conf.d/*.conf;
}
