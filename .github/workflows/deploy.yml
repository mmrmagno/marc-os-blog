name: deploy

on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: rollout to VPS
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: SSH and pull latest image
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            cd ${{ secrets.DEPLOY_PATH || '/opt/marc-os-blog' }}
            # Make sure we're on main and have the latest compose file.
            git fetch --tags origin main
            git reset --hard origin/main
            # Pull the new image and roll. Compose handles draining.
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
            docker compose ps
