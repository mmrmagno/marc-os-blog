version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      astro:
        patterns: ["astro", "@astrojs/*"]
      dev-deps:
        dependency-type: development
    ignore:
      # @astrojs/check only supports typescript ^5 || ^6 so far.
      - dependency-name: typescript
        update-types: ["version-update:semver-major"]

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    groups:
      actions:
        patterns: ["*"]
