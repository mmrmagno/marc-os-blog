# Generated redirects — paste into NPM proxy host Advanced tab

# Shape-based: /blog/:id → /blog/:slug (catches any future old-format links)
location ~ ^/blog/([a-f0-9]{24})$ {
    return 301 /blog/$1;
}

# Per-ObjectId rules for existing posts
location = /blog/67e579a980ac0300f445a48a { return 301 /blog/hello-world; }
location = /blog/68274b5bd29224ef5eaf3c7a { return 301 /blog/lets-encrypt-cert-re-newel-via-dns-01-challenge; }
location = /blog/682c54f1d29224ef5eaf52a9 { return 301 /blog/building-valart-a-tool-for-creating-ascii-art; }
